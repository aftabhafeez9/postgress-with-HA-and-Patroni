#version: "3.8"

networks:
  patroni-network:
    driver: bridge

services:

  # ─────────────────────────────────────────
  # etcd — Leader Election Store
  # ─────────────────────────────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.12
    container_name: etcd
    networks:
      - patroni-network
    environment:
      ETCD_NAME: etcd0
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd:2380
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
      ETCD_INITIAL_CLUSTER: etcd0=http://etcd:2380
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCD_INITIAL_CLUSTER_TOKEN: patroni-cluster-token
    ports:
      - "2379:2379"
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://127.0.0.1:2379", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Node 1 — Will become Primary initially
  # ─────────────────────────────────────────
  node1:
    image: patroni-pg
    build: .
    container_name: node1
    networks:
      - patroni-network
    environment:
      PATRONI_NAME: node1
      PATRONI_RESTAPI_LISTEN: 0.0.0.0:8008
      PATRONI_RESTAPI_CONNECT_ADDRESS: node1:8008
      PATRONI_POSTGRESQL_LISTEN: 0.0.0.0:5432
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: node1:5432
      PATRONI_POSTGRESQL_DATA_DIR: /data/patroni
      PATRONI_ETCD3_HOSTS: etcd:2379
      PATRONI_SCOPE: postgres-cluster
      PATRONI_SUPERUSER_USERNAME: postgres
      PATRONI_SUPERUSER_PASSWORD: postgres123
      PATRONI_REPLICATION_USERNAME: replicator
      PATRONI_REPLICATION_PASSWORD: reppassword
    ports:
      - "5432:5432"
      - "8008:8008"
    depends_on:
      etcd:
        condition: service_healthy
    volumes:
      - node1-data:/data/patroni

  # ─────────────────────────────────────────
  # Node 2 — Replica (can become Primary)
  # ─────────────────────────────────────────
  node2:
    image: patroni-pg
    build: .
    container_name: node2
    networks:
      - patroni-network
    environment:
      PATRONI_NAME: node2
      PATRONI_RESTAPI_LISTEN: 0.0.0.0:8008
      PATRONI_RESTAPI_CONNECT_ADDRESS: node2:8008
      PATRONI_POSTGRESQL_LISTEN: 0.0.0.0:5432
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: node2:5432
      PATRONI_POSTGRESQL_DATA_DIR: /data/patroni
      PATRONI_ETCD3_HOSTS: etcd:2379
      PATRONI_SCOPE: postgres-cluster
      PATRONI_SUPERUSER_USERNAME: postgres
      PATRONI_SUPERUSER_PASSWORD: postgres123
      PATRONI_REPLICATION_USERNAME: replicator
      PATRONI_REPLICATION_PASSWORD: reppassword
    ports:
      - "5433:5432"
      - "8009:8008"
    depends_on:
      etcd:
        condition: service_healthy
    volumes:
      - node2-data:/data/patroni

  # ─────────────────────────────────────────
  # Node 3 — Replica (can become Primary)
  # ─────────────────────────────────────────
  node3:
    image: patroni-pg
    build: .
    container_name: node3
    networks:
      - patroni-network
    environment:
      PATRONI_NAME: node3
      PATRONI_RESTAPI_LISTEN: 0.0.0.0:8008
      PATRONI_RESTAPI_CONNECT_ADDRESS: node3:8008
      PATRONI_POSTGRESQL_LISTEN: 0.0.0.0:5432
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: node3:5432
      PATRONI_POSTGRESQL_DATA_DIR: /data/patroni
      PATRONI_ETCD3_HOSTS: etcd:2379
      PATRONI_SCOPE: postgres-cluster
      PATRONI_SUPERUSER_USERNAME: postgres
      PATRONI_SUPERUSER_PASSWORD: postgres123
      PATRONI_REPLICATION_USERNAME: replicator
      PATRONI_REPLICATION_PASSWORD: reppassword
    ports:
      - "5434:5432"
      - "8010:8008"
    depends_on:
      etcd:
        condition: service_healthy
    volumes:
      - node3-data:/data/patroni

volumes:
  node1-data:
  node2-data:
  node3-data: